server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/stripe_platform?currentSchema=payment
    username: payment_svc
    password: payment_dev
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway manages schema — JPA only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: payment

  flyway:
    schemas: payment
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:29092
    producer:
      acks: all                 # Wait for all in-sync replicas to acknowledge
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.stripe.platform: DEBUG
    org.springframework.kafka: INFO
