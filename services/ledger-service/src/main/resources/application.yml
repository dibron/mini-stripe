server:
  port: 8083
spring:
  application:
    name: ledger-service
  datasource:
    url: jdbc:postgresql://localhost:5433/stripe_platform?currentSchema=ledger
    username: ledger_svc
    password: ledger_dev
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ledger
  flyway:
    schemas: ledger
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: ledger-service
      auto-offset-reset: earliest
      enable-auto-commit: false   # Manual offset commit for correctness
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
